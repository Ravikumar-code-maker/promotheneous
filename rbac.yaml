apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-role
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: monitoring



# Good — this is the RBAC configuration, and it’s one of the most important parts. Without this, Prometheus cannot read anything from Kubernetes.

# Let’s break it down very clearly and simply.

# 🧠 What is this doing (1 line)

# 👉 It gives permission to Prometheus to read data from Kubernetes (pods, nodes, services).

# 🔍 Breakdown into 3 Parts
# 🔹 1. ServiceAccount (WHO)
# apiVersion: v1
# kind: ServiceAccount
# metadata:
#   name: prometheus-sa
#   namespace: monitoring


# 👉 Meaning:

# You are creating a ServiceAccount
# Name = prometheus-sa

# 📌 Simple:
# 👉 This is the identity (user) of Prometheus inside Kubernetes

# 🔹 2. ClusterRole (WHAT PERMISSIONS)
# kind: ClusterRole


# 👉 Why ClusterRole (not Role)?

# Role → works only in one namespace ❌
# ClusterRole → works across entire cluster ✔️
# rules:
#   - apiGroups: [""]
#     resources: ["nodes", "pods", "services", "endpoints"]
#     verbs: ["get", "list", "watch"]


# 👉 Meaning:

# Prometheus can:

# Resource	Why needed
# pods	get pod metrics
# nodes	get node info
# services	discover services
# endpoints	find actual pod IPs
# Verbs:
# get → read one item
# list → read all items
# watch → continuously monitor changes

# 📌 Simple:
# 👉 “Allow Prometheus to read everything it needs”

# 🔹 3. ClusterRoleBinding (CONNECT)
# kind: ClusterRoleBinding


# 👉 This connects:

# ServiceAccount  →  ClusterRole

# roleRef:
#   kind: ClusterRole
#   name: prometheus-role


# 👉 Use this role

# subjects:
#   - kind: ServiceAccount
#     name: prometheus-sa
#     namespace: monitoring


# 👉 Give permission to this ServiceAccount

# 🔄 Full Flow (VERY IMPORTANT)
# Prometheus runs in pod

# Pod uses:

# serviceAccountName: prometheus-sa

# That ServiceAccount has permissions
# Prometheus can now:
# discover pods
# discover nodes
# scrape metrics
# ❌ What happens WITHOUT this?

# 👉 Prometheus will fail:

# ❌ Cannot see pods
# ❌ Cannot see nodes
# ❌ No metrics collected
# 🧠 Simple Analogy
# ServiceAccount = Employee
# ClusterRole = Job permissions
# Binding = Assigning job to employee

# 👉 Without job → employee can’t work

# ⚠️ Small Improvement (Best Practice)

# You can add:

# resources:
#   - nodes/proxy


# 👉 Helps for node metrics (advanced setups)

# 🎯 Final One-Line Understanding

# 👉 This RBAC file gives Prometheus permission to read Kubernetes resources so it can collect metrics.

